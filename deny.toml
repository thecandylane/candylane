# cargo-deny config — supply-chain policy for CI (audit job).
# Starting point; tighten as the dependency tree settles. `cargo deny check` reads this.

[advisories]
version = 2
# RUSTSEC advisory DB. Vulnerabilities are a hard fail. `unmaintained` advisories also fail
# by default in cargo-deny v2; we ignore SPECIFIC ones (with justification) — never a blanket
# downgrade — so a real future vulnerability still breaks the build.
ignore = [
    # number_prefix is unmaintained, NOT vulnerable — a tiny number-formatting helper pulled
    # transitively by indicatif (progress bars) → candylane-cli. No safe upgrade exists until
    # indicatif migrates to `unit-prefix` upstream; we don't depend on it directly. Revisit
    # when indicatif updates. https://rustsec.org/advisories/RUSTSEC-2025-0119
    "RUSTSEC-2025-0119",
]

[licenses]
version = 2
# Candylane is MIT OR Apache-2.0. Allow the common permissive licenses our deps use.
# Add to this list deliberately, with a note, when a new dep needs it.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8
# These allowances are forward-looking (deps may pull them later); don't warn when an
# allowed license isn't currently present in the tree.
unused-allowed-license = "allow"

[bans]
# Duplicate versions are a smell, not a failure, in a young tree. Revisit before 1.0.
multiple-versions = "warn"
wildcards = "warn"

[sources]
# Only crates.io by default. Flag anything from an unexpected registry or git.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
