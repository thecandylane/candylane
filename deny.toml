# cargo-deny config — supply-chain policy for CI (audit job).
# Starting point; tighten as the dependency tree settles. `cargo deny check` reads this.

[advisories]
version = 2
# RUSTSEC advisory DB. Fail on vulnerabilities; tune `ignore` with justification only.
ignore = []

[licenses]
version = 2
# Candylane is MIT OR Apache-2.0. Allow the common permissive licenses our deps use.
# Add to this list deliberately, with a note, when a new dep needs it.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are a smell, not a failure, in a young tree. Revisit before 1.0.
multiple-versions = "warn"
wildcards = "warn"

[sources]
# Only crates.io by default. Flag anything from an unexpected registry or git.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
